<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Detail Pemesanan - JasKan</title>
    <link rel="stylesheet" href="../Style/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
      body { font-family: "Plus Jakarta Sans", sans-serif; background-color: #f7f9fb; }
      h1, h2, h3, legend { font-family: "Manrope", sans-serif; }
    </style>
  </head>
  <body class="mode-biru bg-surface text-on-surface min-h-screen pb-10">
    <header class="sticky top-0 w-full z-50 bg-slate-50/90 backdrop-blur-md shadow-sm flex items-center px-4 py-4 gap-4">
      <a href="../Pemesan/beranda.html" class="p-2 rounded-full hover:bg-slate-200 transition-colors">
        <span class="material-symbols-outlined text-on-surface">arrow_back</span>
      </a>
      <h1 class="text-xl font-bold text-primary">Detail Titipan</h1>
    </header>

    <main class="mt-6 px-6 max-w-2xl mx-auto">
      <section class="mb-8 bg-primary/10 rounded-2xl p-4 flex items-center gap-4 border border-primary/20">
        <div class="w-14 h-14 rounded-full overflow-hidden shadow-sm">
          <img alt="Budi" class="w-full h-full object-cover" src="../Asset/Budi.png" />
        </div>
        <div>
          <p class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider">Menitip ke</p>
          <h2 class="text-lg font-bold">
            Budi <span class="material-symbols-outlined text-primary text-sm align-middle" style="font-variation-settings: &quot;FILL&quot; 1">verified</span>
          </h2>
          <p class="text-sm font-medium text-on-surface-variant">Rute: Hasan Basri -> Gambut</p>
        </div>
      </section>

      <form id="form-pesanan" class="space-y-8">
        <fieldset class="bg-surface-container-lowest p-6 rounded-2xl shadow-sm border border-surface-container-high space-y-5">
          <legend class="text-lg font-extrabold px-2 -ml-2 mb-2">Informasi Barang</legend>
          <div class="space-y-2">
            <label for="nama_barang" class="block text-sm font-bold text-on-surface">Apa yang mau dititip?</label>
            <input type="text" id="nama_barang" name="nama_barang" required placeholder="Cth: Cetak Makalah Sistem Operasi 20 Lembar" class="w-full bg-surface border-surface-variant rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary focus:border-primary transition-all" />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
              <label for="kategori" class="block text-sm font-bold text-on-surface">Kategori</label>
              <select id="kategori" name="kategori" required class="w-full bg-surface border-surface-variant rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary">
                <option value="">Pilih Kategori</option>
                <option value="makanan">Makanan/Minuman</option>
                <option value="dokumen" selected>Dokumen/Print</option>
                <option value="barang">Barang Umum</option>
              </select>
            </div>
            <div class="space-y-2">
              <label for="estimasi_harga" class="block text-sm font-bold text-on-surface">Estimasi Harga (Rp)</label>
              <input type="number" id="estimasi_harga" name="estimasi_harga" required placeholder="Maksimal harga" class="w-full bg-surface border-surface-variant rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary focus:border-primary transition-all" />
            </div>
          </div>
          <div class="space-y-2">
            <label for="titik_temu" class="block text-sm font-bold text-on-surface">Titik Temu (Drop-off)</label>
            <input type="text" id="titik_temu" name="titik_temu" required placeholder="Cth: Gerbang Fakultas Ilkom ULM" class="w-full bg-surface border-surface-variant rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary focus:border-primary transition-all" />
          </div>
        </fieldset>

        <fieldset class="bg-surface-container-lowest p-6 rounded-2xl shadow-sm border border-surface-container-high space-y-4">
          <div class="flex items-center gap-2 mb-2">
            <span class="material-symbols-outlined text-green-600" style="font-variation-settings: &quot;FILL&quot; 1">shield</span>
            <legend class="text-lg font-extrabold">Keamanan Pembayaran</legend>
          </div>
          <p class="text-sm text-on-surface-variant mb-4">
            Dana kamu akan <span class="font-bold text-primary">ditahan oleh sistem (Escrow)</span> dan baru diteruskan ke Jastiper setelah kamu mengonfirmasi barang diterima.
          </p>
          <div class="space-y-3">
            <label class="flex items-center p-4 border border-surface-variant rounded-xl cursor-pointer hover:bg-surface transition-colors focus-within:ring-2 focus-within:ring-primary">
              <input type="radio" name="payment_method" value="qris" required class="w-5 h-5 text-primary border-outline focus:ring-primary" />
              <div class="ml-3 flex-1">
                <span class="block text-sm font-bold">QRIS (Otomatis)</span>
                <span class="block text-xs text-on-surface-variant">Bebas biaya admin</span>
              </div>
              <span class="material-symbols-outlined text-outline">qr_code_scanner</span>
            </label>
            <label class="flex items-center p-4 border border-surface-variant rounded-xl cursor-pointer hover:bg-surface transition-colors focus-within:ring-2 focus-within:ring-primary">
              <input type="radio" name="payment_method" value="va" class="w-5 h-5 text-primary border-outline focus:ring-primary" />
              <div class="ml-3 flex-1">
                <span class="block text-sm font-bold">Virtual Account Mandiri</span>
                <span class="block text-xs text-on-surface-variant">Admin Rp 2.000</span>
              </div>
              <span class="material-symbols-outlined text-outline">account_balance</span>
            </label>
          </div>
        </fieldset>

        <div class="pt-4">
          <button id="btn-submit" type="submit" class="w-full flex items-center justify-center gap-2 py-4 px-6 bg-primary text-on-primary rounded-full font-bold text-[15px] shadow-lg shadow-primary/30 hover:bg-primary-container active:scale-95 transition-all">
            <span class="material-symbols-outlined">lock</span>
            Bayar & Buat Pesanan
          </button>
        </div>
      </form>
    </main>
    <script type="text/javascript" src="../js/jquery.js"></script>
    <script type="text/javascript">
      $(document).ready(function () {
        $("#form-pesanan").on("submit", function (e) {
          e.preventDefault(); 
          
          let btn = $("#btn-submit");
          let originalText = btn.html();
          
          btn.html('<span class="material-symbols-outlined animate-spin">sync</span> Memproses...');
          btn.prop('disabled', true);
          btn.removeClass('hover:bg-primary-container active:scale-95').addClass('opacity-70');

          let dataPesanan = {
            nama_barang: $("#nama_barang").val(),
            kategori: $("#kategori").val(),
            estimasi_harga: $("#estimasi_harga").val(),
            titik_temu: $("#titik_temu").val(),
            payment_method: $("input[name='payment_method']:checked").val()
          };

          $.post("proses_pesanan.php", dataPesanan, function (response) {
            btn.html(originalText);
            btn.prop('disabled', false);
            btn.addClass('hover:bg-primary-container active:scale-95').removeClass('opacity-70');

            if(response.status === 'success') {
                alert(response.pesan + "\nID: " + response.id_resi);
                window.location.href = "../Pemesan/activity.html";
            } else {
                alert("Waduh, ada kesalahan saat memproses pesanan.");
            }
          }, "json");
        });
      });
    </script>
    </body>
</html>
