<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Profil - JasKan Pemesan</title>
    <link rel="stylesheet" href="../Style/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
      body { min-height: max(884px, 100dvh); }
    </style>
  </head>
  <body class="mode-biru bg-[#f7f9fb] font-body text-on-surface min-h-screen pb-32 overflow-y-scroll">
    <header class="relative w-full z-40 bg-[#f8fafc]/90 backdrop-blur-xl shadow-sm border-b border-slate-200">
      <div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
        <div class="text-xl font-bold text-[#0040a1] flex items-center gap-2">
          <img alt="Logo" class="w-auto object-contain h-10" src="../Asset/logobiru.png" />
          <span class="brand-text">JasKan</span>
        </div>
        <nav class="hidden md:flex items-center gap-8 font-bold text-sm font-['Plus_Jakarta_Sans']">
          <a href="../Pemesan/beranda.html" class="text-[#4a5d8e] hover:text-[#0040a1] transition-colors">Home</a>
          <a href="../Pemesan/activity.html" class="text-[#4a5d8e] hover:text-[#0040a1] transition-colors">Activity</a>
          <a href="../Pemesan/inbox.html" class="text-[#4a5d8e] hover:text-[#0040a1] transition-colors">Inbox</a>
          <a href="../Pemesan/profil.html" class="text-[#0040a1] border-b-2 border-[#0040a1] pb-1">Profile</a>
        </nav>
        <div class="flex items-center gap-4">
          <button class="p-2 rounded-full hover:bg-slate-100 transition-all scale-95 active:scale-90 duration-200 relative">
            <span class="material-symbols-outlined text-slate-500">notifications</span>
          </button>
          <div tabindex="0" class="hidden md:block relative w-10 h-10 group focus:outline-none cursor-pointer">
            <div class="w-full h-full rounded-full overflow-hidden border-2 border-primary-fixed shadow-sm group-hover:scale-105 transition-transform">
              <img alt="Profile" class="w-full h-full object-cover" src="../Asset/Pengguna.png" />
            </div>
            <a href="../Penyedia/profil_penyedia.html" class="absolute inset-0 z-50 bg-[#0040a1] text-white rounded-full flex flex-col items-center justify-center opacity-0 pointer-events-none scale-50 group-focus-within:opacity-100 group-focus-within:pointer-events-auto group-focus-within:scale-100 transition-all duration-200 shadow-lg outline-none">
              <span class="material-symbols-outlined text-[18px]">swap_horiz</span>
              <span class="text-[7px] font-extrabold uppercase">Switch</span>
            </a>
          </div>
        </div>
      </div>
    </header>

    <main class="pt-4 px-6 max-w-2xl mx-auto">
      <section class="py-4 flex flex-col items-center text-center">
        <div class="relative mb-6">
          <div class="w-32 h-32 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden border-4 border-white shadow-xl">
            <img alt="User Avatar" class="w-full h-full object-cover" src="../Asset/Pengguna.png" />
          </div>
          <div class="absolute bottom-1 right-1 bg-primary text-on-primary w-8 h-8 rounded-full flex items-center justify-center shadow-lg">
            <span class="material-symbols-outlined text-sm" style="font-variation-settings: &quot;FILL&quot; 1">verified</span>
          </div>
        </div>
        <div class="space-y-1">
          <h2 class="font-headline font-bold text-2xl text-[#191c1e]">Pengguna</h2>
          <p class="text-slate-500 font-medium">(Verified User)</p>
        </div>
      </section>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
        <div class="bg-gradient-to-br from-[#0040a1] to-[#0056d2] p-6 rounded-lg text-white shadow-lg shadow-blue-900/10 flex flex-col justify-between relative overflow-hidden">
          <div class="absolute top-0 right-0 w-48 h-48 bg-white opacity-10 rounded-full -translate-y-1/2 translate-x-1/3 pointer-events-none"></div>
          <div class="absolute bottom-0 left-0 w-32 h-32 bg-white opacity-10 rounded-full translate-y-1/2 -translate-x-1/4 pointer-events-none"></div>
          <div class="relative z-10 flex justify-between items-start">
            <div class="bg-white/20 p-3 rounded-2xl backdrop-blur-md">
              <span class="material-symbols-outlined text-3xl" style="font-variation-settings: &quot;FILL&quot; 1">trophy</span>
            </div>
            <span class="text-xs font-bold uppercase tracking-widest opacity-80">Loyalty Points</span>
          </div>
          <div class="relative z-10 mt-6">
            <p class="text-blue-100 text-sm font-medium">Poin:</p>
            <p class="text-4xl font-headline font-extrabold">150</p>
          </div>
        </div>
        <div class="bg-white p-6 rounded-lg shadow-sm shadow-blue-900/5 flex flex-col justify-center gap-4 border border-slate-100">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-orange-50 flex items-center justify-center text-orange-600">
              <span class="material-symbols-outlined">shopping_bag</span>
            </div>
            <div>
              <p class="text-xs text-slate-500 font-medium">Total Pesanan</p>
              <p class="font-bold text-slate-800">12 Pesanan</p>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-600">
              <span class="material-symbols-outlined">favorite</span>
            </div>
            <div>
              <p class="text-xs text-slate-500 font-medium">Merchant Favorit</p>
              <p class="font-bold text-slate-800">5 Toko</p>
            </div>
          </div>
        </div>
      </div>

      <section class="bg-slate-100/50 rounded-xl p-2 mb-8 border border-slate-100">
        <div class="flex flex-col gap-1">
          <div class="px-4 py-3 mb-1">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Pengaturan Akun</h3>
          </div>
          <button class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-white transition-colors group">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-slate-500 group-hover:text-[#0040a1] transition-colors shadow-sm"><span class="material-symbols-outlined">edit</span></div>
              <span class="font-semibold text-slate-800 group-hover:text-[#0040a1] transition-colors">Ubah Nama</span>
            </div>
            <span class="material-symbols-outlined text-slate-300 group-hover:text-[#0040a1] transition-colors">chevron_right</span>
          </button>
          <button class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-white transition-colors group">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-slate-500 group-hover:text-[#0040a1] transition-colors shadow-sm"><span class="material-symbols-outlined">call</span></div>
              <span class="font-semibold text-slate-800 group-hover:text-[#0040a1] transition-colors">Nomor Telepon</span>
            </div>
            <span class="material-symbols-outlined text-slate-300 group-hover:text-[#0040a1] transition-colors">chevron_right</span>
          </button>
          <button class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-white transition-colors group">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-slate-500 group-hover:text-[#0040a1] transition-colors shadow-sm"><span class="material-symbols-outlined">payments</span></div>
              <span class="font-semibold text-slate-800 group-hover:text-[#0040a1] transition-colors">Metode Pembayaran</span>
            </div>
            <span class="material-symbols-outlined text-slate-300 group-hover:text-[#0040a1] transition-colors">chevron_right</span>
          </button>
          <button class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-white transition-colors group">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-slate-500 group-hover:text-[#0040a1] transition-colors shadow-sm"><span class="material-symbols-outlined">location_on</span></div>
              <span class="font-semibold text-slate-800 group-hover:text-[#0040a1] transition-colors">Alamat Pengiriman</span>
            </div>
            <span class="material-symbols-outlined text-slate-300 group-hover:text-[#0040a1] transition-colors">chevron_right</span>
          </button>
          <button class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-white transition-colors group">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-slate-500 group-hover:text-[#0040a1] transition-colors shadow-sm"><span class="material-symbols-outlined">history</span></div>
              <span class="font-semibold text-slate-800 group-hover:text-[#0040a1] transition-colors">Riwayat Pesanan</span>
            </div>
            <span class="material-symbols-outlined text-slate-300 group-hover:text-[#0040a1] transition-colors">chevron_right</span>
          </button>
          <div class="px-4 py-3 mt-4">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Aplikasi & Bantuan</h3>
          </div>
          <button class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-white transition-colors group">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-slate-500 group-hover:text-[#0040a1] transition-colors shadow-sm"><span class="material-symbols-outlined">notifications_active</span></div>
              <span class="font-semibold text-slate-800 group-hover:text-[#0040a1] transition-colors">Pengaturan Notifikasi</span>
            </div>
            <span class="material-symbols-outlined text-slate-300 group-hover:text-[#0040a1] transition-colors">chevron_right</span>
          </button>
          <button class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-white transition-colors group">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-slate-500 group-hover:text-[#0040a1] transition-colors shadow-sm"><span class="material-symbols-outlined">help</span></div>
              <span class="font-semibold text-slate-800 group-hover:text-[#0040a1] transition-colors">Bantuan</span>
            </div>
            <span class="material-symbols-outlined text-slate-300 group-hover:text-[#0040a1] transition-colors">chevron_right</span>
          </button>
        </div>
      </section>

      <section class="px-2">
        <button class="w-full flex items-center justify-center gap-3 p-4 rounded-xl bg-red-50 hover:bg-red-100 text-red-600 transition-colors font-bold shadow-sm active:scale-95 duration-200">
          <span class="material-symbols-outlined">logout</span>Keluar Sesi
        </button>
      </section>
    </main>

    <nav class="md:hidden fixed bottom-6 left-0 right-0 z-50 flex justify-center px-4">
      <div class="bg-white/90 backdrop-blur-2xl shadow-2xl shadow-blue-900/10 rounded-full w-full max-w-md flex justify-around items-center py-3 px-2 border border-slate-100">
        <a href="../Pemesan/beranda.html" class="flex flex-col items-center justify-center text-slate-400 py-2 px-5 hover:scale-105">
          <span class="material-symbols-outlined text-2xl">home</span>
          <span class="text-[10px] font-semibold mt-1">Home</span>
        </a>
        <a href="../Pemesan/activity.html" class="flex flex-col items-center justify-center text-slate-400 py-2 px-5 hover:scale-105">
          <span class="material-symbols-outlined text-2xl">receipt_long</span>
          <span class="text-[10px] font-semibold mt-1">Activity</span>
        </a>
        <a href="../Pemesan/inbox.html" class="flex flex-col items-center justify-center text-slate-400 py-2 px-5 hover:scale-105 relative">
          <span class="material-symbols-outlined text-2xl">chat</span>
          <span class="text-[10px] font-semibold mt-1">Inbox</span>
        </a>
        <a href="../Pemesan/profil.html" class="flex flex-col items-center justify-center bg-blue-100 text-blue-700 rounded-full py-2 px-5 scale-105">
          <span class="material-symbols-outlined text-2xl" style="font-variation-settings: &quot;FILL&quot; 1">person</span>
          <span class="text-[10px] font-semibold mt-1">Profile</span>
        </a>
      </div>
    </nav>
  </body>
</html>
