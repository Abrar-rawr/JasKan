<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Buka Rute Baru - JasKan</title>
    <link rel="stylesheet" href="../Style/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      body { font-family: "Manrope", sans-serif; background-color: #f4f6ff; }
      h1, legend { font-family: "Plus Jakarta Sans", sans-serif; }
    </style>
  </head>
  <body class="mode-hijau min-h-screen pb-10">
    <header class="sticky top-0 w-full z-50 bg-white/90 backdrop-blur-md shadow-sm flex items-center px-4 py-4 gap-4">
      <a href="../Penyedia/beranda_penyedia.html" class="p-2 rounded-full hover:bg-emerald-50 transition-colors">
        <span class="material-symbols-outlined text-on-surface">arrow_back</span>
      </a>
      <h1 class="text-xl font-bold text-primary">Buka Rute Baru</h1>
    </header>

    <main class="mt-6 px-6 max-w-2xl mx-auto">
      <form action="../Penyedia/activity_penyedia.html" method="GET" class="space-y-8">
        <fieldset class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-5">
          <legend class="text-lg font-extrabold mb-2">Detail Perjalanan</legend>
          <div class="space-y-2">
            <label for="tujuan" class="block text-sm font-bold text-on-surface">Rute Tujuan</label>
            <input type="text" id="tujuan" name="tujuan" required placeholder="Cth: Banjarmasin -> Banjarbaru" class="w-full bg-slate-50 border-slate-200 rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary outline-none" />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
              <label for="waktu" class="block text-sm font-bold text-on-surface">Waktu Berangkat</label>
              <input type="time" id="waktu" name="waktu" required class="w-full bg-slate-50 border-slate-200 rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary" />
            </div>
            <div class="space-y-2">
              <label for="kapasitas" class="block text-sm font-bold text-on-surface">Kapasitas (Slot)</label>
              <input type="number" id="kapasitas" name="kapasitas" placeholder="Cth: 5" class="w-full bg-slate-50 border-slate-200 rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary" />
            </div>
          </div>
        </fieldset>

        <fieldset class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
          <legend class="text-lg font-extrabold">Opsi Pengantaran</legend>
          <div class="space-y-3">
            <label class="flex items-center p-4 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
              <input type="checkbox" name="express" class="w-5 h-5 text-primary rounded border-slate-300 focus:ring-primary" />
              <div class="ml-3">
                <span class="block text-sm font-bold">Layanan Ekspres</span>
                <span class="block text-xs text-secondary">Langsung antar ke depan pintu kelas/lab</span>
              </div>
            </label>
          </div>
        </fieldset>

        <button type="submit" class="w-full py-4 bg-gradient-to-br from-primary to-primary-dim text-white rounded-full font-bold shadow-lg shadow-emerald-900/20 active:scale-95 transition-all">
          Siarkan Rute Sekarang
        </button>
      </form>
    </main>
  </body>
</html>
